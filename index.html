<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>الهروب السريع</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Tahoma,Arial,sans-serif;-webkit-tap-highlight-color:transparent}html,body{width:100%;height:100%;overflow:hidden;background:#020617;color:white;user-select:none}body{display:flex;justify-content:center;align-items:center;background:radial-gradient(circle at top,#172554,#020617 65%,#000)}.game-wrapper{width:min(100vw,430px);height:100vh;max-height:940px;padding:6px;display:flex;flex-direction:column;gap:6px;text-align:center}.hud{display:grid;grid-template-columns:48px 1fr 1fr 1fr 48px;gap:6px;align-items:center;direction:ltr}.hud-box,.hud-icon{height:43px;background:linear-gradient(180deg,rgba(15,23,42,.99),rgba(2,6,23,.96));border:2px solid rgba(147,197,253,.65);border-radius:15px;display:flex;align-items:center;justify-content:center;font-weight:900;box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 0 0 2px rgba(30,64,175,.35),0 7px 20px rgba(0,0,0,.46),0 0 16px rgba(59,130,246,.24);font-size:14px;direction:rtl;color:white;text-shadow:0 2px 5px rgba(0,0,0,.85)}.hud-icon{font-size:25px;cursor:pointer;color:white}.hud-box b{font-size:17px;margin:0 4px}.red{color:#fb7185}.gold{color:#facc15}.canvas-wrap{position:relative;flex:1;min-height:0;border-radius:22px;padding:3px;background:linear-gradient(180deg,#64748b,#172554 35%,#020617);box-shadow:0 18px 50px rgba(0,0,0,.65),0 0 28px rgba(59,130,246,.22)}canvas{width:100%;height:100%;display:block;border-radius:19px;background:#020617;touch-action:none}.overlay-controls{position:absolute;left:0;right:0;bottom:22px;display:flex;justify-content:space-between;padding:0 22px;pointer-events:none;direction:ltr}.drive-btn{width:76px;height:76px;border:3px solid rgba(255,255,255,.55);border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(0,0,0,.48));color:white;font-size:38px;font-weight:900;box-shadow:0 10px 24px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.2);pointer-events:auto;display:none;align-items:center;justify-content:center}.bottom-panel{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;direction:rtl}.bottom-panel button{height:42px;border:0;border-radius:12px;color:white;font-weight:900;font-size:12px;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,.25),0 10px 18px rgba(0,0,0,.25)}#shopBtn{background:linear-gradient(180deg,#0ea5e9,#0369a1)}#rewardBtn{background:linear-gradient(180deg,#a855f7,#7e22ce)}#homeBtn{background:linear-gradient(180deg,#2563eb,#1e40af)}#startBtn{background:linear-gradient(180deg,#22c55e,#15803d)}
.bottom-panel button:active,.hud-icon:active{transform:translateY(3px) scale(.97);filter:brightness(1.18);box-shadow:0 2px 0 rgba(0,0,0,.3),0 5px 12px rgba(0,0,0,.3)}.ad-placeholder{min-height:36px;border:1px dashed rgba(147,197,253,.34);border-radius:12px;display:flex;justify-content:center;align-items:center;color:#cbd5e1;font-size:11px;background:linear-gradient(180deg,rgba(15,23,42,.75),rgba(2,6,23,.65));padding:6px;line-height:1.4}@media(max-width:480px){.game-wrapper{padding:5px}.hud{gap:5px}.hud-box,.hud-icon{height:40px;font-size:12px}.hud-box b{font-size:15px}.drive-btn{width:72px;height:72px;font-size:36px}.bottom-panel button{height:39px;font-size:11px}}
</style>
</head>
<body>
<div class="game-wrapper">
  <div class="hud">
    <div class="hud-icon" id="pauseTop">⏸</div>
    <div class="hud-box"><span class="red">❤️</span><b id="livesText">3</b>/<span>3</span></div>
    <div class="hud-box"><span class="gold">🪙</span><b id="coinsText">0</b></div>
    <div class="hud-box"><span>🧲</span><b id="magnetText">0</b>ث</div>
    <div class="hud-icon" id="muteTop">🔊</div>
  </div>
  <div class="canvas-wrap">
    <canvas id="gameCanvas" width="400" height="650"></canvas>
    <div class="overlay-controls"><button class="drive-btn" id="leftBtn">⬅</button><button class="drive-btn" id="rightBtn">➡</button></div>
  </div>
  <div class="bottom-panel">
    <button id="startBtn">ابدأ اللعب</button>
    <button id="shopBtn">🛒 المتجر</button>
    <button id="rewardBtn">🎁 مكافأة</button>
    <button id="homeBtn">🏠 الرئيسية</button>
  </div>
  <div class="ad-placeholder" id="adBox">مكان الإعلان لاحقًا</div>
</div>
<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const coinsText=document.getElementById('coinsText'),livesText=document.getElementById('livesText'),magnetText=document.getElementById('magnetText');
const startBtn=document.getElementById('startBtn'),leftBtn=document.getElementById('leftBtn'),rightBtn=document.getElementById('rightBtn'),shopBtn=document.getElementById('shopBtn'),homeBtn=document.getElementById('homeBtn'),rewardBtn=document.getElementById('rewardBtn'),pauseTop=document.getElementById('pauseTop'),muteTop=document.getElementById('muteTop'),adBox=document.getElementById('adBox');
let lang=localStorage.getItem('gameLang')||'ar',controlType=localStorage.getItem('controlType')||'buttons',vibration=localStorage.getItem('vibration')==='true';
let screen='home',gameRunning=false,paused=false,muted=false,score=0,coins=Number(localStorage.getItem('coins'))||0,bestScore=Number(localStorage.getItem('bestScore'))||0,lives=3,level=1,animationId,obstacleSpeed=3,obstacleTimer=0,coinTimer=0,powerTimer=0,roadLineOffset=0,cityOffset=0,invincibleTimer=0,magnetTimer=0,shield=0,rewardUsedThisRound=false,shakeTimer=0,crashFlash=0,settingsScroll=0;
let unlockedCars=JSON.parse(localStorage.getItem('unlockedCars')||'["red"]'),selectedCar=localStorage.getItem('selectedCar')||'red';
const carColors={red:{name:['الأحمر الرياضي','Sport Red'],price:0,color:'#ef4444',glass:'#111827'},yellow:{name:['الأصفر','Yellow'],price:40,color:'#facc15',glass:'#1f2937'},blue:{name:['الأزرق','Blue'],price:80,color:'#2563eb',glass:'#bfdbfe'},white:{name:['الأبيض','White'],price:140,color:'#f8fafc',glass:'#1e293b'},green:{name:['الأخضر','Green'],price:220,color:'#22c55e',glass:'#bbf7d0'},purple:{name:['البنفسجي','Purple'],price:320,color:'#9333ea',glass:'#e9d5ff'},black:{name:['الأسود','Black'],price:450,color:'#111827',glass:'#cbd5e1'},cyan:{name:['السماوي','Cyan'],price:650,color:'#06b6d4',glass:'#cffafe'}};
const themes=[{sky:'#25143a',road1:'#25262b',road2:'#101216',side:'#163c2a',name:['المدينة الليلية','Night City']},{sky:'#0f2b46',road1:'#293240',road2:'#111827',side:'#14532d',name:['طريق النخيل','Palm Road']},{sky:'#3b1d1d',road1:'#3f3f46',road2:'#18181b',side:'#7f1d1d',name:['منطقة الخطر','Danger Zone']},{sky:'#28124d',road1:'#312e81',road2:'#111827',side:'#581c87',name:['مدينة النيون','Neon City']}];
const player={x:172,y:540,width:58,height:88,speed:8.6};let obstacles=[],coinItems=[],powers=[];const keys={left:false,right:false};
function t(ar,en){return lang==='ar'?ar:en}function tr(a){return lang==='ar'?a[0]:a[1]}function saveData(){localStorage.setItem('coins',coins);localStorage.setItem('unlockedCars',JSON.stringify(unlockedCars));localStorage.setItem('selectedCar',selectedCar)}function ui(){coinsText.textContent=coins;livesText.textContent=lives;magnetText.textContent=Math.ceil(magnetTimer/60)}function applyLang(){startBtn.textContent=t('ابدأ اللعب','Start');shopBtn.textContent=t('🛒 المتجر','🛒 Shop');rewardBtn.textContent=t('🎁 مكافأة','🎁 Reward');homeBtn.textContent=t('🏠 الرئيسية','🏠 Home')}
function beep(type){if(muted)return;try{const A=window.AudioContext||window.webkitAudioContext,a=new A(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=type==='crash'?110:type==='coin'?820:type==='power'?430:560;o.type=type==='crash'?'sawtooth':'sine';g.gain.setValueAtTime(.06,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.22);o.start();o.stop(a.currentTime+.22)}catch(e){}}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}function panel(x,y,w,h,r=24){ctx.fillStyle='rgba(3,7,18,.88)';rr(x,y,w,h,r);ctx.fill();ctx.strokeStyle='rgba(148,163,184,.35)';ctx.lineWidth=2;rr(x,y,w,h,r);ctx.stroke()}
function city(){let th=themes[(level-1)%themes.length];ctx.fillStyle=th.sky;ctx.fillRect(0,0,canvas.width,canvas.height);cityOffset=(cityOffset+obstacleSpeed*.22)%90;for(let i=0;i<11;i++){let x=(i*52-cityOffset)%500-60,h=75+(i*43%130);ctx.fillStyle=i%2?'rgba(15,23,42,.9)':'rgba(30,41,59,.9)';ctx.fillRect(x,0,44,h);ctx.fillStyle='rgba(251,191,36,.55)';for(let y=14;y<h-10;y+=21){ctx.fillRect(x+9,y,6,8);ctx.fillRect(x+27,y,6,8)}}}
function bg(){let th=themes[(level-1)%themes.length];city();let g=ctx.createLinearGradient(0,70,0,canvas.height);g.addColorStop(0,th.road1);g.addColorStop(1,th.road2);ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(92,0);ctx.lineTo(308,0);ctx.lineTo(395,canvas.height);ctx.lineTo(5,canvas.height);ctx.closePath();ctx.fill();ctx.fillStyle=th.side;ctx.fillRect(0,0,34,canvas.height);ctx.fillRect(366,0,34,canvas.height);ctx.fillStyle='rgba(255,255,255,.55)';ctx.fillRect(56,0,5,canvas.height);ctx.fillRect(339,0,5,canvas.height);ctx.fillStyle='rgba(250,204,21,.95)';ctx.fillRect(70,0,4,canvas.height);ctx.fillRect(326,0,4,canvas.height);roadLineOffset+=obstacleSpeed;if(roadLineOffset>90)roadLineOffset=0;ctx.fillStyle='rgba(255,255,255,.95)';for(let y=-80+roadLineOffset;y<canvas.height;y+=105){rr(153,y,8,58,4);ctx.fill();rr(239,y,8,58,4);ctx.fill()}ctx.fillStyle='rgba(255,255,255,.28)';ctx.font='bold 17px Arial';ctx.textAlign='center';ctx.fillText(tr(th.name),200,40);ctx.textAlign='start'}
function car(x,y,w,h,body,glass='#111827',stripe=true){ctx.save();ctx.translate(x+w/2,y+h/2);ctx.shadowColor='rgba(0,0,0,.65)';ctx.shadowBlur=18;ctx.shadowOffsetY=9;let gr=ctx.createLinearGradient(-w/2,0,w/2,0);gr.addColorStop(0,body);gr.addColorStop(.5,'#ffffff22');gr.addColorStop(1,body);ctx.fillStyle=gr;rr(-w/2,-h/2,w,h,17);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle=glass;rr(-w/2+11,-h/2+13,w-22,24,8);ctx.fill();ctx.fillStyle='rgba(0,0,0,.35)';rr(-w/2+12,-h/2+46,w-24,27,9);ctx.fill();if(stripe){ctx.fillStyle='rgba(255,255,255,.85)';ctx.fillRect(-7,-h/2+6,5,h-12);ctx.fillRect(3,-h/2+6,5,h-12)}ctx.fillStyle='#020617';ctx.fillRect(-w/2-5,-h/2+16,7,22);ctx.fillRect(w/2-2,-h/2+16,7,22);ctx.fillRect(-w/2-5,h/2-39,7,22);ctx.fillRect(w/2-2,h/2-39,7,22);ctx.fillStyle='#fde68a';ctx.fillRect(-w/2+8,-h/2+4,12,5);ctx.fillRect(w/2-20,-h/2+4,12,5);ctx.restore()}
function bigButton(x,y,w,h,text,icon,c1,c2){
  ctx.save();
  // ظل سفلي يعطي إحساس زر حقيقي
  ctx.fillStyle='rgba(0,0,0,.32)';
  rr(x,y+5,w,h,15);ctx.fill();

  let g=ctx.createLinearGradient(0,y,0,y+h);
  g.addColorStop(0,c1);g.addColorStop(1,c2);
  ctx.fillStyle=g;rr(x,y,w,h,15);ctx.fill();

  // لمعة علوية
  ctx.fillStyle='rgba(255,255,255,.16)';
  rr(x+5,y+4,w-10,Math.max(12,h*.32),12);ctx.fill();

  ctx.strokeStyle='rgba(255,255,255,.28)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle='white';ctx.font='bold 22px Arial';ctx.textAlign='center';ctx.fillText(text,x+w/2,y+h/2+8);
  ctx.font='28px Arial';ctx.fillText(icon,x+w-34,y+h/2+10);
  ctx.restore();
}

function tapEffect(x,y){
  ctx.save();
  ctx.fillStyle='rgba(255,255,255,.18)';
  ctx.beginPath();
  ctx.arc(x,y,26,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.35)';
  ctx.lineWidth=2;
  ctx.stroke();
  ctx.restore();
}

function premiumText(text,x,y,size,fill1,fill2){
  ctx.save();
  ctx.textAlign='center';
  ctx.font='900 '+size+'px Tahoma';
  ctx.lineWidth=Math.max(5,size*.13);
  ctx.strokeStyle='rgba(0,0,0,.82)';
  ctx.shadowColor='rgba(0,0,0,.9)';
  ctx.shadowBlur=10;
  ctx.strokeText(text,x,y);
  let g=ctx.createLinearGradient(x-90,y-size,x+90,y+12);
  g.addColorStop(0,fill1);g.addColorStop(1,fill2);
  ctx.fillStyle=g;
  ctx.fillText(text,x,y);
  ctx.restore();
}

function updatePlayer(){if(keys.left&&player.x>42)player.x-=player.speed;if(keys.right&&player.x+player.width<358)player.x+=player.speed;if(invincibleTimer>0)invincibleTimer--;if(magnetTimer>0)magnetTimer--}function hit(a,b,p=8){return a.x+p<b.x+b.width-p&&a.x+a.width-p>b.x+p&&a.y+p<b.y+b.height-p&&a.y+a.height-p>b.y+p}function hitC(c){return player.x<c.x+c.r&&player.x+player.width>c.x-c.r&&player.y<c.y+c.r&&player.y+player.height>c.y-c.r}function lose(){if(invincibleTimer>0)return;if(vibration&&navigator.vibrate)navigator.vibrate(120);shakeTimer=8;crashFlash=10;if(shield>0){shield--;invincibleTimer=95;beep('power');return}lives--;invincibleTimer=95;beep('crash');if(lives<=0)endGame()}

function rewardLife(){if(screen==='game'&&gameRunning){adBox.textContent=t('المكافأة تظهر بعد الخسارة فقط','Reward appears after game over');return}if(rewardUsedThisRound){adBox.textContent=t('استخدمت المكافأة هذه الجولة','Reward already used');return}rewardUsedThisRound=true;lives=Math.max(lives,1)+1;ui();adBox.textContent=t('تمت إضافة قلب إضافي ❤️','Extra life added ❤️');beep('power')}function toggleMute(){muted=!muted;muteTop.textContent=muted?'🔇':'🔊'}
startBtn.addEventListener('click',startGame);shopBtn.addEventListener('click',shop);homeBtn.addEventListener('click',showHome);rewardBtn.addEventListener('click',rewardLife);muteTop.addEventListener('click',toggleMute);pauseTop.addEventListener('click',()=>{if(screen==='game')togglePause();else if(screen==='end')startGame()});
canvas.addEventListener('click',e=>{const r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)*(canvas.width/r.width),y=(e.clientY-r.top)*(canvas.height/r.height);tapEffect(x,y);if(screen==='home'){if(x>67&&x<333&&y>382&&y<452){startGame();return}if(x>302&&x<380&&y>482&&y<574){shop();return}if(x>207&&x<285&&y>482&&y<574){rewardLife();return}if(x>112&&x<190&&y>482&&y<574){settingsPage();return}if(x>17&&x<95&&y>482&&y<574){instructionsPage();return}}if(screen==='shop'){if(x>110&&x<290&&y>568&&y<612){showHome();return}let col=x<200?0:1,row=Math.floor((y-145)/90),i=row*2+col;if(i>=0&&i<8)buyOrSelect(i);return}if(screen==='settings'){
  // زر الرجوع ثابت
  if(x>90&&x<310&&y>545&&y<593){showHome();return}

  const sy=y+settingsScroll;
  if(x>70&&x<330&&sy>180&&sy<230){controlType=controlType==='buttons'?'swipe':'buttons';localStorage.setItem('controlType',controlType);settingsPage();return}
  if(x>70&&x<330&&sy>258&&sy<308){vibration=!vibration;localStorage.setItem('vibration',vibration);settingsPage();return}
  if(x>70&&x<330&&sy>336&&sy<386){lang=lang==='ar'?'en':'ar';localStorage.setItem('gameLang',lang);settingsPage();return}
  if(x>70&&x<330&&sy>414&&sy<464){ratePage();return}
  if(x>70&&x<330&&sy>492&&sy<542){confirmResetPage();return}
}
if(screen==='confirmReset'){
  if(x>70&&x<330&&y>330&&y<380){factoryReset();return}
  if(x>90&&x<310&&y>405&&y<455){settingsPage();return}
}
if(screen==='rate'){if(x>100&&x<300&&y>340&&y<390){settingsPage();return}}if(screen==='instructions'){if(x>90&&x<310&&y>535&&y<587){showHome();return}}if(screen==='end'){if(x>70&&x<330&&y>410&&y<462){startGame();return}if(x>70&&x<330&&y>470&&y<522){showHome();return}if(x>70&&x<330&&y>530&&y<582){shareGame();return}}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')keys.left=true;if(e.key==='ArrowRight'||e.key==='d')keys.right=true;if(e.key==='Enter')startGame();if(e.key===' '){e.preventDefault();togglePause()}if(screen==='shop'&&['1','2','3','4','5','6','7','8'].includes(e.key))buyOrSelect(Number(e.key)-1)});document.addEventListener('keyup',e=>{if(e.key==='ArrowLeft'||e.key==='a')keys.left=false;if(e.key==='ArrowRight'||e.key==='d')keys.right=false});function bindBtn(b,side){b.addEventListener('touchstart',e=>{e.preventDefault();keys[side]=true});b.addEventListener('touchend',e=>{e.preventDefault();keys[side]=false});b.addEventListener('touchcancel',()=>keys[side]=false);b.addEventListener('mousedown',()=>keys[side]=true);b.addEventListener('mouseup',()=>keys[side]=false);b.addEventListener('mouseleave',()=>keys[side]=false)}bindBtn(leftBtn,'left');bindBtn(rightBtn,'right');let touchStartX=0,touchStartY=0;
canvas.addEventListener('touchstart',e=>{
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
},{passive:true});
canvas.addEventListener('touchend',e=>{
  let dx=e.changedTouches[0].clientX-touchStartX;
  let dy=e.changedTouches[0].clientY-touchStartY;

  // سحب صفحة الإعدادات
  if(screen==='settings'){
    if(Math.abs(dy)>25){
      settingsScroll=Math.max(0,Math.min(95,settingsScroll-dy));
      settingsPage();
    }
    return;
  }

  // سحب التحكم داخل اللعب
  if(controlType!=='swipe'||screen!=='game')return;
  if(Math.abs(dx)>35&&Math.abs(dx)>Math.abs(dy)){
    player.x=dx>0?Math.min(player.x+92,300):Math.max(player.x-92,42)
  }
},{passive:true});

canvas.addEventListener('wheel',e=>{
  if(screen!=='settings')return;
  e.preventDefault();
  settingsScroll=Math.max(0,Math.min(95,settingsScroll+e.deltaY));
  settingsPage();
},{passive:false});

ui();showHome();
