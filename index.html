<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>سباق اللانهاية</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Tahoma,Arial,sans-serif;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;min-height:100dvh;overflow:hidden;background:#020617;color:white;user-select:none}
body{display:flex;justify-content:center;align-items:stretch;background:radial-gradient(circle at top,#172554,#020617 65%,#000);padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
.game-wrapper{width:min(100vw,430px);height:100dvh;max-height:none;padding:6px;display:flex;flex-direction:column;gap:6px;text-align:center}
.hud{display:grid;grid-template-columns:48px 1fr 1fr 1fr 48px;gap:6px;align-items:center;direction:ltr}
.hud-box,.hud-icon{height:43px;background:linear-gradient(180deg,rgba(15,23,42,.98),rgba(2,6,23,.95));border:2px solid rgba(148,163,184,.45);border-radius:13px;display:flex;align-items:center;justify-content:center;font-weight:900;box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 6px 18px rgba(0,0,0,.36);font-size:14px;direction:rtl}
.hud-icon{font-size:22px;cursor:pointer}.hud-box b{font-size:17px;margin:0 4px}.red{color:#fb7185}.gold{color:#facc15}
.canvas-wrap{position:relative;flex:1;min-height:0;border-radius:22px;padding:3px;background:linear-gradient(180deg,#64748b,#172554 35%,#020617);box-shadow:0 18px 50px rgba(0,0,0,.65),0 0 28px rgba(59,130,246,.22)}
canvas{width:100%;height:100%;display:block;border-radius:19px;background:#020617;touch-action:none;image-rendering:auto}
.overlay-controls{position:absolute;left:0;right:0;bottom:22px;display:flex;justify-content:space-between;padding:0 22px;pointer-events:none;direction:ltr}
.drive-btn{width:76px;height:76px;border:3px solid rgba(255,255,255,.55);border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(0,0,0,.48));color:white;font-size:38px;font-weight:900;box-shadow:0 10px 24px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.2);pointer-events:auto;display:none;align-items:center;justify-content:center}
.bottom-panel{display:none}
.bottom-panel button{height:42px;border:0;border-radius:12px;color:white;font-weight:900;font-size:12px;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,.25),0 10px 18px rgba(0,0,0,.25)}
#startBtn{background:linear-gradient(180deg,#22c55e,#15803d)}#shopBtn{background:linear-gradient(180deg,#0ea5e9,#0369a1)}#rewardBtn{background:linear-gradient(180deg,#a855f7,#7e22ce)}#homeBtn{background:linear-gradient(180deg,#2563eb,#1e40af)}
.bottom-panel button:active,.hud-icon:active,.drive-btn:active{transform:translateY(3px) scale(.97);filter:brightness(1.18);box-shadow:0 2px 0 rgba(0,0,0,.3),0 5px 12px rgba(0,0,0,.3)}
.ad-placeholder{min-height:36px;border:1px dashed rgba(147,197,253,.34);border-radius:12px;display:flex;justify-content:center;align-items:center;color:#cbd5e1;font-size:11px;background:linear-gradient(180deg,rgba(15,23,42,.75),rgba(2,6,23,.65));padding:6px;line-height:1.4}
@media(max-width:480px){.game-wrapper{padding:5px}.hud{gap:5px}.hud-box,.hud-icon{height:40px;font-size:12px}.hud-box b{font-size:15px}.drive-btn{width:72px;height:72px;font-size:36px}.bottom-panel button{height:39px;font-size:11px}}
</style>
</head>
<body>
<div class="game-wrapper">
  <div class="hud">
    <div class="hud-icon" id="pauseTop">⏸</div>
    <div class="hud-box"><span class="red">❤️</span><b id="livesText">3</b>/<span>3</span></div>
    <div class="hud-box"><span class="gold">🪙</span><b id="coinsText">0</b></div>
    <div class="hud-box"><span>🧲</span><b id="magnetText">0</b>ث</div>
    <div class="hud-icon" id="muteTop">🔊</div>
  </div>
  <div class="canvas-wrap">
    <canvas id="gameCanvas" width="400" height="650"></canvas>
    <div class="overlay-controls"><button class="drive-btn" id="leftBtn">⬅</button><button class="drive-btn" id="rightBtn">➡</button></div>
  </div>
  <div class="bottom-panel">
    <button id="startBtn">ابدأ اللعب</button>
    <button id="shopBtn">🛒 المتجر</button>
    <button id="rewardBtn">🎁 مكافأة</button>
    <button id="homeBtn">🏠 الرئيسية</button>
  </div>
  <div class="ad-placeholder" id="adBox">مكان الإعلان لاحقًا</div>
</div>
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const GAME_W=400;
const GAME_H=650;
function setupHiDPICanvas(){
  const dpr=Math.min(window.devicePixelRatio||1,4);
  canvas.width=Math.round(GAME_W*dpr);
  canvas.height=Math.round(GAME_H*dpr);
  canvas.style.width='100%';
  canvas.style.height='100%';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.imageSmoothingEnabled=true;
  ctx.imageSmoothingQuality='high';
  ctx.textRendering='geometricPrecision';
}
function redrawScreen(){
  setupHiDPICanvas();
  if(screen==='home')home();
  else if(screen==='shop')shop();
  else if(screen==='settings')settingsPage();
  else if(screen==='instructions')instructionsPage();
  else if(screen==='rate')ratePage();
  else if(screen==='end')drawEndScreen();
}
window.addEventListener('resize',()=>{if(!gameRunning||paused)redrawScreen();else setupHiDPICanvas();});
const coinsText=document.getElementById('coinsText');
const livesText=document.getElementById('livesText');
const magnetText=document.getElementById('magnetText');
const startBtn=document.getElementById('startBtn');
const leftBtn=document.getElementById('leftBtn');
const rightBtn=document.getElementById('rightBtn');
const shopBtn=document.getElementById('shopBtn');
const homeBtn=document.getElementById('homeBtn');
const rewardBtn=document.getElementById('rewardBtn');
const pauseTop=document.getElementById('pauseTop');
const muteTop=document.getElementById('muteTop');
const adBox=document.getElementById('adBox');

let lang=localStorage.getItem('gameLang')||'ar';
let controlType=localStorage.getItem('controlType')||'buttons';
let vibration=localStorage.getItem('vibration')==='true';
let screen='home',gameRunning=false,paused=false,muted=false;
let score=0,runCoins=0,coins=Number(localStorage.getItem('coins'))||0,bestScore=Number(localStorage.getItem('bestScore'))||0;
let lives=3,level=1,obstacleSpeed=3,obstacleTimer=0,coinTimer=0,powerTimer=0,roadLineOffset=0,cityOffset=0;
let invincibleTimer=0,magnetTimer=0,shield=0,rewardUsedThisRound=false,shakeTimer=0,crashFlash=0,settingsScroll=0;
let bestRewardAvailable=false,bestRewardClaimed=false,giftAnimationId=null,giftTimeoutId=null;
let pendingGiftLives=0,pendingGiftMagnet=0,pendingGiftShield=0;
let animationId=null;
let audioCtx=null;

function initAudio(){
  try{
    const AudioC=window.AudioContext||window.webkitAudioContext;
    if(!audioCtx || audioCtx.state==='closed')audioCtx=new AudioC();
    if(audioCtx.state==='suspended')audioCtx.resume().catch(()=>{});
  }catch(e){}
}
let unlockedCars=JSON.parse(localStorage.getItem('unlockedCars')||'["red"]');
let selectedCar=localStorage.getItem('selectedCar')||'red';

const carColors={
  red:{name:['الأحمر الرياضي','Sport Red'],price:0,color:'#ef4444',glass:'#111827',type:'sport'},
  yellow:{name:['الصاعقة الصفراء','Yellow Bolt'],price:40,color:'#facc15',glass:'#1f2937',type:'classic'},
  blue:{name:['الأزرق السريع','Blue Speed'],price:80,color:'#2563eb',glass:'#bfdbfe',type:'race'},
  white:{name:['الأبيض الملكي','Royal White'],price:140,color:'#f8fafc',glass:'#1e293b',type:'luxury'},
  green:{name:['الأخضر الجبلي','Green SUV'],price:220,color:'#22c55e',glass:'#bbf7d0',type:'suv'},
  purple:{name:['البنفسجي النيون','Neon Purple'],price:320,color:'#9333ea',glass:'#e9d5ff',type:'neon'},
  black:{name:['الأسود الفخم','Black Phantom'],price:450,color:'#111827',glass:'#cbd5e1',type:'luxury'},
  cyan:{name:['السماوي الكهربائي','Cyber Cyan'],price:650,color:'#06b6d4',glass:'#cffafe',type:'cyber'}
};
const themes=[
  {sky:'#25143a',road1:'#25262b',road2:'#101216',side:'#163c2a',name:['المدينة الليلية','Night City']},
  {sky:'#0f2b46',road1:'#293240',road2:'#111827',side:'#14532d',name:['طريق النخيل','Palm Road']},
  {sky:'#3b1d1d',road1:'#3f3f46',road2:'#18181b',side:'#7f1d1d',name:['منطقة الخطر','Danger Zone']},
  {sky:'#28124d',road1:'#312e81',road2:'#111827',side:'#581c87',name:['مدينة النيون','Neon City']}
];
const player={x:172,y:540,width:58,height:88,speed:8.6};
let obstacles=[],coinItems=[],powers=[];
const keys={left:false,right:false};

function t(ar,en){return lang==='ar'?ar:en}
function tr(a){return lang==='ar'?a[0]:a[1]}
function saveData(){localStorage.setItem('coins',coins);localStorage.setItem('unlockedCars',JSON.stringify(unlockedCars));localStorage.setItem('selectedCar',selectedCar)}
function ui(){coinsText.textContent=screen==='game'?runCoins:coins;livesText.textContent=lives;magnetText.textContent=Math.ceil(magnetTimer/60)}
function applyLang(){document.title=t('سباق اللانهاية','Infinity Race');startBtn.textContent=t('ابدأ اللعب','Start');shopBtn.textContent=t('🛒 المتجر','🛒 Shop');rewardBtn.textContent=t('🎁 مكافأة','🎁 Reward');homeBtn.textContent=t('🏠 الرئيسية','🏠 Home')}
function beep(type){
  if(muted)return;
  try{
    initAudio();
    if(!audioCtx)return;

    const play=()=>{
      try{
        const o=audioCtx.createOscillator();
        const g=audioCtx.createGain();
        o.connect(g);
        g.connect(audioCtx.destination);
        o.frequency.value=type==='crash'?110:type==='coin'?820:type==='power'?430:560;
        o.type=type==='crash'?'sawtooth':'sine';
        const now=audioCtx.currentTime;
        g.gain.cancelScheduledValues(now);
        g.gain.setValueAtTime(.08,now);
        g.gain.exponentialRampToValueAtTime(.001,now+.22);
        o.start(now);
        o.stop(now+.22);
        o.onended=()=>{try{o.disconnect();g.disconnect()}catch(e){}};
      }catch(e){}
    };

    if(audioCtx.state==='running')play();
    else audioCtx.resume().then(play).catch(()=>{});
  }catch(e){}
}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}
function panel(x,y,w,h,r=24){ctx.fillStyle='rgba(3,7,18,.88)';rr(x,y,w,h,r);ctx.fill();ctx.strokeStyle='rgba(148,163,184,.35)';ctx.lineWidth=2;rr(x,y,w,h,r);ctx.stroke()}
function city(){let th=themes[(level-1)%themes.length];ctx.fillStyle=th.sky;ctx.fillRect(0,0,GAME_W,GAME_H);cityOffset=(cityOffset+obstacleSpeed*.22)%90;for(let i=0;i<11;i++){let x=(i*52-cityOffset)%500-60,h=75+(i*43%130);ctx.fillStyle=i%2?'rgba(15,23,42,.9)':'rgba(30,41,59,.9)';ctx.fillRect(x,0,44,h);ctx.fillStyle='rgba(251,191,36,.55)';for(let y=14;y<h-10;y+=21){ctx.fillRect(x+9,y,6,8);ctx.fillRect(x+27,y,6,8)}}}
function bg(){let th=themes[(level-1)%themes.length];city();let g=ctx.createLinearGradient(0,70,0,GAME_H);g.addColorStop(0,th.road1);g.addColorStop(1,th.road2);ctx.fillStyle=g;ctx.fillRect(90,0,220,GAME_H);ctx.fillStyle=th.side;ctx.fillRect(0,0,34,GAME_H);ctx.fillRect(366,0,34,GAME_H);ctx.fillStyle='rgba(255,255,255,.55)';ctx.fillRect(56,0,5,GAME_H);ctx.fillRect(339,0,5,GAME_H);ctx.fillStyle='rgba(250,204,21,.95)';ctx.fillRect(70,0,4,GAME_H);ctx.fillRect(326,0,4,GAME_H);roadLineOffset+=obstacleSpeed;if(roadLineOffset>90)roadLineOffset=0;ctx.fillStyle='rgba(255,255,255,.95)';for(let y=-80+roadLineOffset;y<GAME_H;y+=105){rr(153,y,8,58,4);ctx.fill();rr(239,y,8,58,4);ctx.fill()}ctx.fillStyle='rgba(255,255,255,.28)';ctx.font='bold 17px Arial';ctx.textAlign='center';ctx.fillText(tr(th.name),200,40);ctx.textAlign='start'}
function car(x,y,w,h,body,glass='#111827',stripe=true,type='sport'){
  ctx.save();
  ctx.translate(x+w/2,y+h/2);

  // ظل السيارة
  ctx.shadowColor='rgba(0,0,0,.7)';
  ctx.shadowBlur=18;
  ctx.shadowOffsetY=9;

  // اختلاف الشكل حسب نوع السيارة
  let radius=17, topW=w-22, cabinY=-h/2+13, cabinH=24;
  if(type==='suv'){radius=10;topW=w-14;cabinY=-h/2+10;cabinH=28}
  if(type==='classic'){radius=20;topW=w-26;cabinY=-h/2+15;cabinH=22}
  if(type==='race'){radius=24;topW=w-30;cabinY=-h/2+12;cabinH=20}
  if(type==='luxury'){radius=15;topW=w-18;cabinY=-h/2+12;cabinH=26}
  if(type==='neon'||type==='cyber'){radius=18;topW=w-20;cabinY=-h/2+12;cabinH=24}

  // جسم السيارة الأساسي
  let gr=ctx.createLinearGradient(-w/2,0,w/2,0);
  gr.addColorStop(0,body);
  gr.addColorStop(.45,'rgba(255,255,255,.22)');
  gr.addColorStop(1,body);
  ctx.fillStyle=gr;
  rr(-w/2,-h/2,w,h,radius);ctx.fill();
  ctx.shadowBlur=0;

  // لمعة جانبية
  ctx.fillStyle='rgba(255,255,255,.12)';
  rr(-w/2+6,-h/2+6,w-12,h-12,Math.max(8,radius-4));ctx.fill();

  // زجاج السيارة
  ctx.fillStyle=glass;
  rr(-topW/2,cabinY,topW,cabinH,8);ctx.fill();
  ctx.fillStyle='rgba(0,0,0,.35)';
  rr(-w/2+12,-h/2+46,w-24,27,9);ctx.fill();

  // تفاصيل حسب النوع
  if(type==='sport'||type==='race'){
    ctx.fillStyle='rgba(255,255,255,.9)';
    ctx.fillRect(-7,-h/2+6,5,h-12);
    ctx.fillRect(3,-h/2+6,5,h-12);
  }
  if(type==='classic'){
    ctx.fillStyle='rgba(255,255,255,.7)';
    ctx.fillRect(-w/2+9,0,w-18,4);
  }
  if(type==='suv'){
    ctx.fillStyle='rgba(0,0,0,.35)';
    ctx.fillRect(-w/2+6,-h/2+36,w-12,5);
  }
  if(type==='neon'||type==='cyber'){
    ctx.shadowColor=body;
    ctx.shadowBlur=18;
    ctx.strokeStyle='rgba(255,255,255,.8)';
    ctx.lineWidth=2;
    rr(-w/2+5,-h/2+5,w-10,h-10,14);ctx.stroke();
    ctx.shadowBlur=0;
  }
  if(type==='luxury'){
    ctx.fillStyle='rgba(255,255,255,.75)';
    rr(-w/2+16,-h/2+6,w-32,5,3);ctx.fill();
  }

  // الإطارات
  ctx.fillStyle='#020617';
  ctx.fillRect(-w/2-5,-h/2+16,7,22);
  ctx.fillRect(w/2-2,-h/2+16,7,22);
  ctx.fillRect(-w/2-5,h/2-39,7,22);
  ctx.fillRect(w/2-2,h/2-39,7,22);

  // الأنوار
  ctx.fillStyle='#fde68a';
  ctx.fillRect(-w/2+8,-h/2+4,12,5);
  ctx.fillRect(w/2-20,-h/2+4,12,5);
  ctx.fillStyle='rgba(239,68,68,.9)';
  ctx.fillRect(-w/2+9,h/2-9,12,4);
  ctx.fillRect(w/2-21,h/2-9,12,4);

  ctx.restore();
}
function bigButton(x,y,w,h,text,icon,c1,c2){ctx.save();ctx.fillStyle='rgba(0,0,0,.32)';rr(x,y+5,w,h,15);ctx.fill();let g=ctx.createLinearGradient(0,y,0,y+h);g.addColorStop(0,c1);g.addColorStop(1,c2);ctx.fillStyle=g;rr(x,y,w,h,15);ctx.fill();ctx.fillStyle='rgba(255,255,255,.16)';rr(x+5,y+4,w-10,Math.max(12,h*.32),12);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.28)';ctx.lineWidth=1.5;ctx.stroke();ctx.fillStyle='white';ctx.font='bold 22px Arial';ctx.textAlign='center';ctx.fillText(text,x+w/2,y+h/2+8);ctx.font='28px Arial';ctx.fillText(icon,x+w-34,y+h/2+10);ctx.restore()}
function tapEffect(x,y){ctx.save();ctx.fillStyle='rgba(255,255,255,.18)';ctx.beginPath();ctx.arc(x,y,26,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=2;ctx.stroke();ctx.restore()}
function drawAdSlot(x,y,w,h,label){ctx.save();ctx.fillStyle='rgba(15,23,42,.72)';rr(x,y,w,h,10);ctx.fill();ctx.setLineDash([6,5]);ctx.strokeStyle='rgba(250,204,21,.55)';ctx.lineWidth=1.5;rr(x,y,w,h,10);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='rgba(250,204,21,.88)';ctx.font='bold 12px Arial';ctx.textAlign='center';ctx.fillText(label||t('📢 مساحة إعلان','📢 Ad Space'),x+w/2,y+h/2+4);ctx.restore()}
function logo(){ctx.textAlign='center';ctx.font='900 40px Tahoma';ctx.lineWidth=7;ctx.strokeStyle='#020617';ctx.strokeText(t('سباق','Infinity'),200,140);ctx.fillStyle='white';ctx.fillText(t('سباق','Infinity'),200,140);ctx.font='900 47px Tahoma';ctx.strokeText(t('اللانهاية','Race'),200,185);let g=ctx.createLinearGradient(120,180,280,225);g.addColorStop(0,'#fde047');g.addColorStop(1,'#f97316');ctx.fillStyle=g;ctx.fillText(t('اللانهاية','Race'),200,185);ctx.font='34px Arial';ctx.fillText('🏎️',285,205)}
function home(){bg();ctx.fillStyle='rgba(0,0,0,.35)';ctx.fillRect(0,0,GAME_W,GAME_H);panel(36,35,328,595,24);logo();ctx.textAlign='center';ctx.fillStyle='rgba(15,23,42,.82)';rr(72,238,256,44,14);ctx.fill();ctx.fillStyle='white';ctx.font='bold 17px Arial';ctx.fillText('❤️ 3      🪙 '+coins+'      💎 '+unlockedCars.length,200,266);bigButton(70,300,260,62,t('ابدأ اللعب','Start Game'),'▶','#22c55e','#15803d');bigButton(70,374,260,54,t('المتجر','Shop'),'🛒','#0ea5e9','#0369a1');bigButton(70,440,260,54,t('الإعدادات','Settings'),'⚙️','#64748b','#334155');bigButton(70,502,260,50,t('تعليمات','How to Play'),'؟','#7c3aed','#5b21b6');ctx.fillStyle='rgba(15,23,42,.82)';rr(60,575,280,28,14);ctx.fill();ctx.fillStyle='#cbd5e1';ctx.font='13px Arial';ctx.fillText(t('تجنب السيارات واجمع العملات','Avoid cars and collect coins'),200,594);
// Ad slot (Home)
drawAdSlot(80,605,240,24,t('📢 إعلان','📢 Ad'));ctx.textAlign='start'}
function setMenu(){leftBtn.style.display='none';rightBtn.style.display='none';startBtn.style.display='none';rewardBtn.style.display='none';applyLang()}
function showHome(){screen='home';gameRunning=false;paused=false;cancelAnimationFrame(animationId);pauseTop.textContent='⏸';pauseTop.style.background='';setMenu();adBox.textContent=t('مكان الإعلان لاحقًا — يظهر بعد نهاية الجولة','Ad space — appears after each round');home()}
function shop(){screen='shop';gameRunning=false;paused=false;cancelAnimationFrame(animationId);setMenu();bg();ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillRect(0,0,GAME_W,GAME_H);panel(18,35,364,585,24);ctx.textAlign='center';ctx.font='900 30px Tahoma';ctx.fillStyle='white';ctx.fillText(t('متجر السيارات','Car Shop'),200,85);ctx.fillStyle='#fde047';ctx.font='bold 17px Arial';ctx.fillText(t('عملاتك: ','Coins: ')+coins+' 🪙',200,118);Object.entries(carColors).forEach(([id,c],i)=>{let col=i%2,row=Math.floor(i/2),x=35+col*171,y=145+row*90,owned=unlockedCars.includes(id),sel=selectedCar===id;ctx.fillStyle=sel?'rgba(34,197,94,.34)':'rgba(15,23,42,.82)';rr(x,y,158,74,17);ctx.fill();ctx.strokeStyle=sel?'#86efac':'rgba(148,163,184,.28)';ctx.stroke();car(x+12,y+15,32,45,c.color,c.glass,true,c.type);ctx.fillStyle='white';ctx.font='bold 13px Arial';ctx.fillText(tr(c.name),x+84,y+25);ctx.fillStyle=owned?'#86efac':'#fde68a';ctx.font='12px Arial';ctx.fillText(owned?(sel?t('محدد ✅','Selected ✅'):t('اختيار ','Select ')+(i+1)):t('السعر ','Price ')+c.price+' 🪙',x+84,y+54)});// Ad slot (Shop)

}if(screen==='end'){if(x>70&&x<330&&y>410&&y<462){startGame();return}if(x>70&&x<330&&y>470&&y<522){showHome();return}if(x>70&&x<330&&y>530&&y<582){shareGame();return}}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')keys.left=true;if(e.key==='ArrowRight'||e.key==='d')keys.right=true;if(e.key==='Enter')startGame();if(e.key===' '){e.preventDefault();togglePause()}if(screen==='shop'&&['1','2','3','4','5','6','7','8'].includes(e.key))buyOrSelect(Number(e.key)-1)});
